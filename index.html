<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fermingar Photobooth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a0533 0%, #3b0764 50%, #1a0533 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #fff; }
    h1 { font-size: 2.2rem; text-align: center; margin-bottom: 6px; background: linear-gradient(90deg, #f9d423, #ff4e50); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 8px rgba(255,200,0,0.4)); }
    .subtitle { font-size: 1rem; color: #d4b3f0; margin-bottom: 20px; text-align: center; }
    .main-area { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 640px; gap: 16px; }
    .video-container { position: relative; width: 100%; border-radius: 18px; overflow: hidden; box-shadow: 0 0 40px rgba(200,100,255,0.5); background: #000; }
    #video { width: 100%; display: block; transform: scaleX(-1); }
    .filters, .frames { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .filter-btn, .frame-btn { padding: 8px 16px; border-radius: 20px; border: 2px solid transparent; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .filter-btn.active { border-color: #f9d423; background: rgba(249,212,35,0.2); color: #f9d423; font-weight: bold; }
    .frame-btn.active { border-color: #ff4e50; background: rgba(255,78,80,0.2); color: #ff9090; font-weight: bold; }
    .section-label { font-size: 0.8rem; color: #b89fd4; text-transform: uppercase; letter-spacing: 1px; width: 100%; text-align: center; }
    .snap-btn { padding: 16px 48px; border-radius: 50px; border: none; background: linear-gradient(90deg, #f9d423, #ff4e50); color: #fff; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 20px rgba(255,100,50,0.5); transition: transform 0.15s; }
    .snap-btn:hover { transform: scale(1.06); }
    .gallery-title { font-size: 1.1rem; color: #f0d9ff; margin-top: 10px; width: 100%; text-align: center; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; width: 100%; }
    .gallery-item { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.4); animation: popIn 0.3s ease; }
    @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .gallery-item img { width: 100%; display: block; border-radius: 12px; }
    .gallery-item .dl-btn { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.65); color: #fff; border: none; border-radius: 8px; padding: 5px 10px; font-size: 0.75rem; cursor: pointer; }
    .flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 999; animation: flashAnim 0.4s ease; }
    @keyframes flashAnim { 0% { opacity: 0.9; } 100% { opacity: 0; } }
    .countdown-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 8rem; font-weight: 900; color: rgba(255,255,255,0.95); pointer-events: none; opacity: 0; transition: opacity 0.15s; }
    .countdown-overlay.visible { opacity: 1; }
    .start-btn { padding: 14px 36px; border-radius: 50px; border: none; background: linear-gradient(90deg, #7c3aed, #a855f7); color: #fff; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 20px rgba(168,85,247,0.5); transition: transform 0.15s; }
  </style>
</head>
<body>
<h1>✨ Fermingar Photobooth ✨</h1>
<p class="subtitle">Taktu myndir og geymdu minningunar! 🎊</p>
<div class="main-area">
  <div class="video-container"><video id="video" autoplay playsinline></video><div class="countdown-overlay" id="countdown"></div></div>
  <button class="start-btn" id="startBtn" onclick="startCamera()">📷 Kveikja á myndavél</button>
  <div class="section-label">Síur</div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('none',this)">Ekkert</button>
    <button class="filter-btn" onclick="setFilter('grayscale',this)">Svart/hvítt</button>
    <button class="filter-btn" onclick="setFilter('sepia',this)">Sepia</button>
    <button class="filter-btn" onclick="setFilter('warm',this)">Hlýtt</button>
    <button class="filter-btn" onclick="setFilter('cool',this)">Kalt</button>
    <button class="filter-btn" onclick="setFilter('vivid',this)">Lifleg</button>
  </div>
  <div class="section-label">Ramminn</div>
  <div class="frames">
    <button class="frame-btn active" onclick="setFrame('none',this)">Enginn</button>
    <button class="frame-btn" onclick="setFrame('gold',this)">🥇 Gull</button>
    <button class="frame-btn" onclick="setFrame('party',this)">🎉 Party</button>
    <button class="frame-btn" onclick="setFrame('hearts',this)">💜 Hjörtu</button>
    <button class="frame-btn" onclick="setFrame('stars',this)">⭐ Stjörnur</button>
  </div>
  <button class="snap-btn" id="snapBtn" onclick="startCountdown()" disabled>📸 Taka mynd!</button>
  <div class="gallery-title" id="galleryTitle" style="display:none">🖼️ Myndir þínar</div>
  <div class="gallery" id="gallery"></div>
</div>
<canvas id="captureCanvas" style="display:none;"></canvas>
<div class="flash" id="flash" style="display:none;"></div>
<script>
let stream=null,currentFilter='none',currentFrame='none',photoCount=0;
const video=document.getElementById('video'),snapBtn=document.getElementById('snapBtn'),startBtn=document.getElementById('startBtn'),captureCanvas=document.getElementById('captureCanvas'),countdownEl=document.getElementById('countdown'),gallery=document.getElementById('gallery'),galleryTitle=document.getElementById('galleryTitle'),flash=document.getElementById('flash');
async function startCamera(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});video.srcObject=stream;video.style.filter=getFilter(currentFilter);startBtn.style.display='none';snapBtn.disabled=false;}catch(e){alert('Leyfðu aðgang að myndavél!');}}
function setFilter(f,b){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');if(stream)video.style.filter=getFilter(f);}
function setFrame(f,b){currentFrame=f;document.querySelectorAll('.frame-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');}
function getFilter(f){return{grayscale:'grayscale(100%)',sepia:'sepia(80%)',warm:'saturate(130%) hue-rotate(-15deg) brightness(1.05)',cool:'saturate(110%) hue-rotate(20deg) brightness(1.02)',vivid:'saturate(170%) contrast(110%)'}[f]||'none';}
function startCountdown(){snapBtn.disabled=true;let c=3;countdownEl.textContent=c;countdownEl.classList.add('visible');const t=setInterval(()=>{c--;if(c>0){countdownEl.textContent=c;}else{countdownEl.classList.remove('visible');clearInterval(t);takePhoto();setTimeout(()=>snapBtn.disabled=false,800);}},1000);}
function takePhoto(){flash.style.display='block';flash.style.animation='none';flash.offsetHeight;flash.style.animation='flashAnim 0.4s ease forwards';setTimeout(()=>flash.style.display='none',450);const w=video.videoWidth,h=video.videoHeight;captureCanvas.width=w;captureCanvas.height=h;const ctx=captureCanvas.getContext('2d');ctx.save();ctx.translate(w,0);ctx.scale(-1,1);ctx.filter=getFilter(currentFilter);ctx.drawImage(video,0,0,w,h);ctx.restore();ctx.filter='none';drawFrame(ctx,currentFrame,w,h);photoCount++;addToGallery(captureCanvas.toDataURL('image/jpeg',0.92),photoCount);}
function drawFrame(ctx,frame,w,h){const em=Math.min(w,h)*0.08;if(frame==='gold'){ctx.strokeStyle='#f9d423';ctx.lineWidth=em*0.6;ctx.strokeRect(em*0.3,em*0.3,w-em*0.6,h-em*0.6);[[em*.5,em*.5],[w-em*.5,em*.5],[em*.5,h-em*.5],[w-em*.5,h-em*.5]].forEach(p=>{ctx.font=em+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⭐',p[0],p[1]);});}else if(frame==='party'){const e=['🎉','🎊','🎈','✨','🥳','🎆','🎇','💫'];ctx.font=em+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';for(let i=0;i<7;i++){ctx.fillText(e[i%8],em*.7+i*((w-em*1.4)/6),em*.7);ctx.fillText(e[(i+3)%8],em*.7+i*((w-em*1.4)/6),h-em*.7);}}else if(frame==='hearts'){const e=['💜','💛','💜','💛','💜','💛','💜'];ctx.font=em+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';for(let i=0;i<7;i++){ctx.fillText(e[i],em*.7+i*((w-em*1.4)/6),em*.7);ctx.fillText(e[i],em*.7+i*((w-em*1.4)/6),h-em*.7);}const rows=Math.floor((h-em*2)/(em*1.2));for(let i=0;i<rows;i++){const y=em*1.5+i*((h-em*3)/Math.max(rows-1,1));ctx.fillText('💜',em*.7,y);ctx.fillText('💛',w-em*.7,y);}}else if(frame==='stars'){const e=['⭐','🌟','✨','💫','⭐','🌟','✨'];ctx.font=em+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';for(let i=0;i<7;i++){ctx.fillText(e[i],em*.7+i*((w-em*1.4)/6),em*.7);ctx.fillText(e[(i+2)%7],em*.7+i*((w-em*1.4)/6),h-em*.7);}}}
function addToGallery(dataURL,num){galleryTitle.style.display='block';const item=document.createElement('div');item.className='gallery-item';const img=document.createElement('img');img.src=dataURL;img.alt='Mynd '+num;const btn=document.createElement('button');btn.className='dl-btn';btn.textContent='⬇ Vista';btn.onclick=()=>{const a=document.createElement('a');a.href=dataURL;a.download='fermingar-mynd-'+num+'.jpg';a.click();};item.appendChild(img);item.appendChild(btn);gallery.insertBefore(item,gallery.firstChild);}
</script>
</body>
</html>
